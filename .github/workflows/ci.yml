name: CI

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Install the bedrock extra so boto3 resolves for the import in
      # tools/memory/embeddings.py. Pyright runs over src/ only.
      - run: uv sync --locked --extra bedrock
      - run: uv run pyright

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      # addopts already prints a term-missing coverage report; the gate is a
      # backstop against significant regression, set ~2pt below the current
      # ~95% baseline so routine TUI churn stays green but a real drop fails CI.
      - run: uv run pytest --cov-fail-under=93

  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Export locked requirements
        run: uv export --locked --no-emit-project --no-hashes --format requirements-txt > requirements.audit.txt
      - name: Audit dependencies
        run: uv run --with pip-audit pip-audit --strict --requirement requirements.audit.txt
