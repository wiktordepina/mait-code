[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mait-code"
version = "0.2.0"
description = "Companion framework extending Claude Code with persistent memory, identity, and skills"
requires-python = ">=3.14"
dependencies = [
    "mcp[cli]>=1.26.0",
    "sqlite-vec>=0.1.3",
    "dateparser>=1.3.0",
    "pyyaml>=6.0.3",
]

[project.scripts]
mait-code-session-start = "mait_code.hooks.session_start:main"
mait-code-observe = "mait_code.hooks.observe:main"
mait-code-format = "mait_code.hooks.auto_format:main"
mait-code-memory-server = "mait_code.mcp.memory_server:main"
mait-code-reminders-server = "mait_code.mcp.reminders_server:main"
mait-code-reflect = "mait_code.tools.reflect:main"
mait-code-rebuild-db = "mait_code.tools.rebuild_db:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
]
